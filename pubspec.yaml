name: multimax
description: "Manage stock, order, packing and delivery."
publish_to: 'none'

version: 1.4.0+7

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.2
  dio: ^5.3.3
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  path_provider: ^2.1.4
  get_storage: ^2.1.1
  collection: ^1.18.0
  uuid: ^4.5.1
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  flutter_html: ^3.0.0-beta.2
  share_plus: ^7.0.0
  qr_flutter: ^4.1.0
  pdf: ^3.11.1
  barcode_widget: ^2.0.4
  sqflite: ^2.4.2
  path: ^1.9.1
  package_info_plus: ^8.0.0
  sqflite_common_ffi: ^2.3.3
  
  # Clean Architecture dependencies
  dartz: ^0.10.1
  equatable: ^2.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  
  # Testing & Code Generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - lib/assets/images/logo.jpg
    - lib/assets/fonts/

  fonts:
    - family: ShureTechMono
      fonts:
        - asset: lib/assets/fonts/ShureTechMonoNerdFontMono-Regular.ttf
          style: normal
