name: multimax
description: "Manage stock, order, packing and delivery."
publish_to: 'none'

version: 1.4.1+8

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.2
  dio: ^5.3.3
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  path_provider:
  get_storage:
  collection:
  uuid:
  intl: ^0.19.0
  percent_indicator:
  flutter_html:
  share_plus: ^7.0.0
  qr_flutter:
  pdf:
  barcode_widget: ^2.0.4
  sqflite: ^2.4.2
  path: ^1.9.1
  package_info_plus: ^8.0.0
  sqflite_common_ffi:
  # Scales the collapsed toolbar title font down before wrapping so
  # the full DocType name always fits without ellipsis.
  auto_size_text: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/assets/images/logo.jpg
    - lib/assets/fonts/

  fonts:
    - family: ShureTechMono
      fonts:
        - asset: lib/assets/fonts/ShureTechMonoNerdFontMono-Regular.ttf
          style: normal
